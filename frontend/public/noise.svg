<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" preserveAspectRatio="none">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" seed="2" />
      <feColorMatrix in="noise" type="saturate" values="0" />
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="#030509" />
  <rect width="1024" height="1024" fill="#ffffff" opacity="0.05" filter="url(#noise)" />
</svg>